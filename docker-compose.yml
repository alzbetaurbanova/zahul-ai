version: '3.8'
services:
  zahul:
    container_name: zahul_ai
    build: .
    ports:
      - "5666:5666"

    environment:
      - DATABASE_URL=/app/data/bot.db
      - TRASH_DB_URL=/app/data/trash.db
      - TZ=Europe/Bratislava

    command: python main.py --host 0.0.0.0

    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./bot_run.py:/app/bot_run.py
      - ./api:/app/api
      - ./static:/app/static
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - PUBLIC_URL=${PUBLIC_URL}
    entrypoint: ["/bin/sh", "-c", "if [ -z \"$$PUBLIC_URL\" ]; then echo '[caddy] PUBLIC_URL is not set, skipping.'; exit 0; fi; exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./static/error_handler:/srv/errors:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: on-failure
    networks:
      - web
    depends_on:
      - zahul

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
