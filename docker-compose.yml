version: '3.8'
services:
  zahul:
    container_name: zahul_ai
    build: .
    expose:
      - "5666"

    environment:
      - DATABASE_URL=/app/data/bot.db
      - TZ=Europe/Bratislava

    command: python main.py --host 0.0.0.0

    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./bot_run.py:/app/bot_run.py
      - ./api:/app/api
      - ./static:/app/static
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - web
    depends_on:
      - zahul

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
