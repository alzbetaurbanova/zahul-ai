<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-darker text-light" data-page="users">
    <div id="toast-container" class="toast z-50"></div>

    <div id="navbar-container"></div>
    <script src="/static/js/navbar.js" defer></script>
    <script src="/static/js/utils.js" defer></script>
    <script src="/static/js/pages/users.js" defer></script>

    <main class="p-6">
        <div class="max-w-3xl mx-auto">
            <div class="flex-between mb-6">
                <h1 class="heading-page">Users</h1>
                <button id="new-user-btn" class="btn-primary text-sm"><i class="fas fa-user-plus mr-2"></i>New User</button>
            </div>
            <div id="user-list" class="space-y-2"></div>
        </div>
    </main>

    <!-- New User Modal -->
    <div id="new-modal" class="modal-backdrop hidden">
        <div class="modal-box modal-sm">
            <div class="modal-header p-5">
                <h2 class="heading-section"><i class="fas fa-user-plus mr-2 text-indigo-400"></i>New User</h2>
                <button class="btn-icon modal-close" data-modal="new-modal"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="label-form">Auth method</label>
                    <div class="flex rounded-lg overflow-hidden border border-gray-700 text-xs w-fit">
                        <button type="button" id="auth-tab-local" class="mode-tab mode-tab-on">Local</button>
                        <button type="button" id="auth-tab-discord" class="mode-tab mode-tab-off">Discord</button>
                    </div>
                </div>
                <div id="local-fields">
                    <div class="mb-3">
                        <label class="label-form">Username</label>
                        <input type="text" id="new-username" class="input-field" autocomplete="off">
                    </div>
                    <div>
                        <label class="label-form">Password</label>
                        <input type="password" id="new-password" class="input-field" placeholder="Min 8 characters" autocomplete="new-password">
                    </div>
                </div>
                <div id="discord-fields" class="hidden">
                    <label class="label-form">Discord username</label>
                    <input type="text" id="new-discord-username" class="input-field" autocomplete="off">
                </div>
                <div>
                    <label class="label-form">Role</label>
                    <select id="new-role" class="input-field">
                        <option value="guest">Guest – read only</option>
                        <option value="mod" selected>Mod – assigned servers</option>
                        <option value="admin">Admin – full control</option>
                    </select>
                </div>
                <div id="new-servers-field" class="hidden">
                    <label class="label-form">Server IDs <span class="text-hint">(comma-separated)</span></label>
                    <input type="text" id="new-server-ids" class="input-field" placeholder="e.g. 123456,789012">
                </div>
                <p id="new-modal-error" class="text-red-400 text-xs hidden"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-gray text-sm modal-close" data-modal="new-modal">Cancel</button>
                <button id="new-modal-save" class="btn-primary text-sm"><i class="fas fa-check mr-2"></i>Create</button>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="edit-modal" class="modal-backdrop hidden">
        <div class="modal-box modal-sm">
            <div class="modal-header p-5">
                <h2 id="edit-modal-title" class="heading-section"></h2>
                <button class="btn-icon modal-close" data-modal="edit-modal"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div id="edit-role-field">
                    <label class="label-form">Role</label>
                    <select id="edit-role" class="input-field">
                        <option value="guest">Guest – read only</option>
                        <option value="mod">Mod – assigned servers</option>
                        <option value="admin">Admin – full control</option>
                    </select>
                </div>
                <div id="edit-servers-field" class="hidden">
                    <label class="label-form">Server IDs <span class="text-hint">(comma-separated)</span></label>
                    <input type="text" id="edit-server-ids" class="input-field" placeholder="e.g. 123456,789012">
                </div>
                <div id="edit-pw-field">
                    <label class="label-form">New password <span class="text-hint">(leave empty to keep)</span></label>
                    <input type="password" id="edit-password" class="input-field" placeholder="Min 8 characters" autocomplete="new-password">
                </div>
                <p id="edit-modal-error" class="text-red-400 text-xs hidden"></p>
            </div>
            <div class="modal-footer">
                <button id="edit-delete-btn" class="btn-danger text-sm mr-auto"><i class="fas fa-trash mr-2"></i>Delete</button>
                <button class="btn-gray text-sm modal-close" data-modal="edit-modal">Cancel</button>
                <button id="edit-modal-save" class="btn-primary text-sm"><i class="fas fa-save mr-2"></i>Save</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="delete-modal" class="modal-backdrop hidden">
        <div class="modal-box modal-sm">
            <div class="modal-header p-5">
                <h2 class="heading-section text-red-400"><i class="fas fa-trash mr-2"></i>Delete User</h2>
                <button class="btn-icon modal-close" data-modal="delete-modal"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div class="p-5">
                <p class="text-secondary text-sm">Delete <strong id="delete-modal-name" class="text-light"></strong>? This cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-gray text-sm modal-close" data-modal="delete-modal">Cancel</button>
                <button id="delete-modal-confirm" class="btn-danger text-sm"><i class="fas fa-trash mr-2"></i>Delete</button>
            </div>
        </div>
    </div>
</body>
</html>
