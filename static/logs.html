<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --darker: #0f172a; --light: #f8fafc; }
        body { background-color: var(--darker); color: var(--light); font-family: 'Inter', sans-serif; }
        .nav-link:hover { background-color: rgba(99, 102, 241, 0.1); }
        .nav-link.active { border-bottom: 2px solid var(--primary); }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .status-active { background-color: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-inactive { background-color: #ef4444; }
        .status-starting { background-color: #f59e0b; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .tab-active { border-bottom: 2px solid var(--primary); color: white; }
        pre { white-space: pre-wrap; word-break: break-all; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        input[type="date"] { color-scheme: dark; }
    </style>
</head>
<body class="bg-darker text-light min-h-screen">
    <div id="navbar-container"></div>
    <script>window.activePage = '';</script>
    <script src="/static/navbar.js"></script>

    <main class="p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-white">Logs</h1>
                <button id="export-btn" class="bg-gray-800 hover:bg-gray-700 text-white text-sm px-3 py-2 rounded-lg"><i class="fas fa-download mr-2"></i>Export JSON</button>
            </div>

            <!-- Tabs -->
            <div class="flex gap-6 border-b border-gray-800 mb-6">
                <button data-tab="discord" class="tab-btn tab-active pb-3 text-sm font-medium text-white transition-colors">Discord</button>
                <button data-tab="admin" class="tab-btn pb-3 text-sm font-medium text-gray-400 hover:text-white transition-colors">Admin</button>
            </div>

            <!-- Discord Filters -->
            <div id="discord-filters" class="bg-gray-900 border border-gray-800 rounded-lg p-4 mb-5 flex flex-wrap gap-3 items-end">
                <div><label class="block text-xs text-gray-400 mb-1">From</label><div class="relative"><input type="date" id="df-from" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="df-from-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs" style="height:24px;display:flex;align-items:center;"><i class="fas fa-times"></i></button></div></div>
                <div><label class="block text-xs text-gray-400 mb-1">To</label><div class="relative"><input type="date" id="df-to" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="df-to-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs" style="height:24px;display:flex;align-items:center;"><i class="fas fa-times"></i></button></div></div>
                <div class="relative"><label class="block text-xs text-gray-400 mb-1">Character</label>
                    <input type="text" id="df-character" autocomplete="off" placeholder="any" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 w-32">
                    <div id="df-character-dd" class="hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl max-h-48 overflow-y-auto min-w-full"></div>
                </div>
                <div class="relative"><label class="block text-xs text-gray-400 mb-1">User</label>
                    <input type="text" id="df-user" autocomplete="off" placeholder="any" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 w-32">
                    <div id="df-user-dd" class="hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl max-h-48 overflow-y-auto min-w-full"></div>
                </div>
                <div class="relative">
                    <label class="block text-xs text-gray-400 mb-1">Source</label>
                    <button class="cb-dd-btn bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 flex items-center gap-2 min-w-[8rem]" data-dd="dd-source">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down text-xs text-gray-400 ml-auto"></i>
                    </button>
                    <div id="dd-source" class="cb-dd hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[10rem]">
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="chat" class="df-source-cb accent-indigo-500"> Chat</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="scheduler" class="df-source-cb accent-indigo-500"> Scheduler</label>
                    </div>
                </div>
                <div class="relative">
                    <label class="block text-xs text-gray-400 mb-1">Status</label>
                    <button class="cb-dd-btn bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 flex items-center gap-2 min-w-[8rem]" data-dd="dd-status">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down text-xs text-gray-400 ml-auto"></i>
                    </button>
                    <div id="dd-status" class="cb-dd hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[8rem]">
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="ok" class="df-status-cb accent-indigo-500"> OK</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="error" class="df-status-cb accent-indigo-500"> Error</label>
                    </div>
                </div>
                <button id="discord-clear-btn" class="ml-auto text-gray-400 hover:text-white text-sm self-end">Clear filters</button>
            </div>

            <!-- Admin Filters -->
            <div id="admin-filters" class="hidden bg-gray-900 border border-gray-800 rounded-lg p-4 mb-5 flex flex-wrap gap-3 items-end">
                <div><label class="block text-xs text-gray-400 mb-1">From</label><div class="relative"><input type="date" id="af-from" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="af-from-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs" style="height:24px;display:flex;align-items:center;"><i class="fas fa-times"></i></button></div></div>
                <div><label class="block text-xs text-gray-400 mb-1">To</label><div class="relative"><input type="date" id="af-to" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="af-to-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs" style="height:24px;display:flex;align-items:center;"><i class="fas fa-times"></i></button></div></div>
                <div class="relative">
                    <label class="block text-xs text-gray-400 mb-1">Action</label>
                    <button class="cb-dd-btn bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 flex items-center gap-2 min-w-[10rem]" data-dd="dd-action">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down text-xs text-gray-400 ml-auto"></i>
                    </button>
                    <div id="dd-action" class="cb-dd hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[11rem]">
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="character.create" class="af-action-cb accent-indigo-500"> character.create</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="character.update" class="af-action-cb accent-indigo-500"> character.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="character.delete" class="af-action-cb accent-indigo-500"> character.delete</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="task.create" class="af-action-cb accent-indigo-500"> task.create</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="task.update" class="af-action-cb accent-indigo-500"> task.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="task.delete" class="af-action-cb accent-indigo-500"> task.delete</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="config.update" class="af-action-cb accent-indigo-500"> config.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="config.security.update" class="af-action-cb accent-indigo-500"> config.security.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="servers.override.on" class="af-action-cb accent-indigo-500"> servers.override.on</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="servers.override.off" class="af-action-cb accent-indigo-500"> servers.override.off</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="server.activate" class="af-action-cb accent-indigo-500"> server.activate</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="server.deactivate" class="af-action-cb accent-indigo-500"> server.deactivate</label>
                    </div>
                </div>
                <button id="admin-clear-btn" class="ml-auto text-gray-400 hover:text-white text-sm self-end">Clear filters</button>
            </div>

            <!-- Log List -->
            <div id="log-list" class="space-y-2"></div>

            <!-- Pagination -->
            <div id="pagination" class="flex items-center justify-between mt-6 text-sm text-gray-400">
                <div class="flex items-center gap-2">
                    <span id="pagination-info"></span>
                    <select id="limit-select" class="bg-gray-800 border border-gray-700 text-white text-xs rounded-lg px-2 py-1 ml-3">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="text-xs text-gray-500">/ page</span>
                </div>
                <div class="flex gap-2">
                    <button id="prev-btn" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg disabled:opacity-40" disabled>← Prev</button>
                    <button id="next-btn" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg disabled:opacity-40" disabled>Next →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-900 rounded-xl border border-gray-800 shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between p-5 border-b border-gray-800">
                <h2 class="text-white font-bold text-lg">Log Detail</h2>
                <button id="detail-close" class="text-gray-500 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="detail-body" class="p-5 space-y-4 text-sm"></div>
        </div>
    </div>

    <script>
    (() => {
        const _qs = new URLSearchParams(location.search);
        let currentTab = _qs.get('tab') === 'admin' ? 'admin' : 'discord';
        let currentPage = parseInt(_qs.get('page')) || 1;
        let LIMIT = parseInt(_qs.get('limit')) || 25;
        let totalItems = 0;
        let channelMap = {};  // channel_id -> {server_name, channel_name}
        let serverNames = {};  // server_id -> server_name

        function makeFilterCombobox(inputId, dropdownId, options) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            function showDropdown() {
                const q = input.value.toLowerCase();
                const filtered = q ? options.filter(o => o.toLowerCase().includes(q)) : options;
                if (!filtered.length) { dropdown.classList.add('hidden'); return; }
                dropdown.innerHTML = filtered.map(o =>
                    `<div class="combobox-item px-3 py-2 cursor-pointer hover:bg-gray-800 text-sm text-white" data-val="${esc(o)}">${esc(o)}</div>`
                ).join('');
                dropdown.querySelectorAll('.combobox-item').forEach(item => {
                    item.addEventListener('mousedown', e => {
                        e.preventDefault();
                        input.value = item.dataset.val;
                        dropdown.classList.add('hidden');
                        currentPage = 1; fetchLogs();
                    });
                });
                dropdown.classList.remove('hidden');
            }
            input.addEventListener('focus', showDropdown);
            input.addEventListener('input', () => { currentPage = 1; fetchLogs(); showDropdown(); });
            input.addEventListener('blur', () => setTimeout(() => dropdown.classList.add('hidden'), 150));
        }

        async function loadServerNames() {
            try {
                const servers = await fetch('/api/servers/').then(r => r.json());
                servers.forEach(s => { serverNames[s.server_id] = s.server_name; });
            } catch {}
        }

        async function loadMeta() {
            try {
                const data = await fetch('/api/logs/meta').then(r => r.json());
                channelMap = data.channels || {};
                makeFilterCombobox('df-character', 'df-character-dd', data.characters || []);
                makeFilterCombobox('df-user', 'df-user-dd', data.users || []);
            } catch (e) {}
        }

        function resolveChannel(channel_id) {
            if (!channel_id) return '';
            if (channel_id === 'dm') return 'Direct Message';
            if (channel_id.startsWith('dm:')) return `DM: ${channel_id.slice(3)}`;
            const rawId = channel_id.startsWith('channel:') ? channel_id.slice(8) : channel_id;
            const info = channelMap[rawId];
            if (info) return `${info.server_name} / #${info.channel_name}`;
            return channel_id;
        }

        function activateTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => {
                const active = b.dataset.tab === tab;
                b.classList.toggle('tab-active', active);
                b.classList.toggle('text-white', active);
            });
            document.getElementById('discord-filters').classList.toggle('hidden', tab !== 'discord');
            document.getElementById('admin-filters').classList.toggle('hidden', tab !== 'admin');
        }

        activateTab(currentTab);

        // --- Tab switching ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentPage = 1;
                activateTab(btn.dataset.tab);
                history.replaceState(null, '', `?tab=${currentTab}`);
                fetchLogs();
            });
        });

        // --- Checkbox dropdown logic ---
        function updateDdLabel(btn) {
            const ddId = btn.dataset.dd;
            const checked = [...document.querySelectorAll(`#${ddId} input:checked`)].map(el => el.value);
            btn.querySelector('.cb-dd-label').textContent = checked.length === 0 ? 'All' : checked.length === 1 ? checked[0] : checked.length + ' selected';
        }
        function clearDd(cls) {
            document.querySelectorAll('.' + cls + '-cb').forEach(cb => cb.checked = false);
            document.querySelectorAll('.cb-dd-btn').forEach(btn => updateDdLabel(btn));
        }
        document.querySelectorAll('.cb-dd-btn').forEach(btn => {
            const dd = document.getElementById(btn.dataset.dd);
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cb-dd').forEach(d => { if (d !== dd) d.classList.add('hidden'); });
                dd.classList.toggle('hidden');
            });
        });
        document.addEventListener('click', e => {
            document.querySelectorAll('.cb-dd-btn').forEach(btn => {
                const dd = document.getElementById(btn.dataset.dd);
                if (!btn.contains(e.target) && !dd.contains(e.target)) dd.classList.add('hidden');
            });
        });
        document.querySelectorAll('.df-source-cb, .df-status-cb, .af-action-cb').forEach(cb => {
            cb.addEventListener('change', () => {
                updateDdLabel(cb.closest('.cb-dd').previousElementSibling);
                currentPage = 1; fetchLogs();
            });
        });

        // --- Filter auto-fire ---
        ['df-from','df-to'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => { currentPage = 1; fetchLogs(); });
        });
        ['af-from','af-to'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => { currentPage = 1; fetchLogs(); });
        });

        document.getElementById('df-from-clear').addEventListener('click', () => { document.getElementById('df-from').value = ''; currentPage = 1; fetchLogs(); });
        document.getElementById('df-to-clear').addEventListener('click', () => { document.getElementById('df-to').value = ''; currentPage = 1; fetchLogs(); });
        document.getElementById('af-from-clear').addEventListener('click', () => { document.getElementById('af-from').value = ''; currentPage = 1; fetchLogs(); });
        document.getElementById('af-to-clear').addEventListener('click', () => { document.getElementById('af-to').value = ''; currentPage = 1; fetchLogs(); });
        document.getElementById('discord-clear-btn').addEventListener('click', () => {
            ['df-from','df-to','df-character','df-user'].forEach(id => document.getElementById(id).value = '');
            clearDd('df-source'); clearDd('df-status');
            currentPage = 1; fetchLogs();
        });
        document.getElementById('admin-clear-btn').addEventListener('click', () => {
            ['af-from','af-to'].forEach(id => document.getElementById(id).value = '');
            clearDd('af-action');
            currentPage = 1; fetchLogs();
        });

        // --- Pagination ---
        document.getElementById('prev-btn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; fetchLogs(); } });
        document.getElementById('next-btn').addEventListener('click', () => { if (currentPage * LIMIT < totalItems) { currentPage++; fetchLogs(); } });
        document.getElementById('limit-select').addEventListener('change', function() { LIMIT = parseInt(this.value); currentPage = 1; fetchLogs(); });
        document.getElementById('limit-select').value = LIMIT;

        // --- Export ---
        document.getElementById('export-btn').addEventListener('click', () => {
            const params = buildParams();
            window.location.href = `/api/logs/${currentTab}/export?${params}`;
        });

        function getChecked(cls) {
            return [...document.querySelectorAll('.' + cls + ':checked')].map(el => el.value);
        }
        function buildParams() {
            const p = new URLSearchParams({ page: currentPage, limit: LIMIT });
            if (currentTab === 'discord') {
                const v = id => document.getElementById(id).value;
                if (v('df-from')) p.set('from_date', v('df-from'));
                if (v('df-to')) p.set('to_date', v('df-to'));
                if (v('df-character')) p.set('character', v('df-character'));
                if (v('df-user')) p.set('user', v('df-user'));
                getChecked('df-source-cb').forEach(s => p.append('source', s));
                getChecked('df-status-cb').forEach(s => p.append('status', s));
            } else {
                const v = id => document.getElementById(id).value;
                if (v('af-from')) p.set('from_date', v('af-from'));
                if (v('af-to')) p.set('to_date', v('af-to'));
                getChecked('af-action-cb').forEach(s => p.append('action', s));
            }
            return p.toString();
        }

        async function fetchLogs() {
            syncUrl();
            const list = document.getElementById('log-list');
            list.innerHTML = '<div class="text-gray-500 text-center py-12">Loading...</div>';
            try {
                const res = await fetch(`/api/logs/${currentTab}?${buildParams()}`);
                const data = await res.json();
                totalItems = data.total;
                renderLogs(data.items);
                updatePagination();
            } catch (e) {
                list.innerHTML = '<div class="text-red-400 text-center py-12">Failed to load logs.</div>';
            }
        }

        function renderLogs(items) {
            const list = document.getElementById('log-list');
            if (!items.length) { list.innerHTML = '<div class="text-gray-500 text-center py-12">No logs found.</div>'; return; }
            list.innerHTML = items.map(item => currentTab === 'discord' ? discordRow(item) : adminRow(item)).join('');
            list.querySelectorAll('[data-log-id]').forEach(row => {
                row.addEventListener('click', () => openDetail(parseInt(row.dataset.logId)));
            });
        }

        function fmt(ts) {
            return ts ? new Date(ts).toLocaleString('sk-SK', { hour12: false }) : '';
        }

        function discordRow(item) {
            const statusColor = item.status === 'error' ? 'text-red-400' : 'text-green-400';
            const sourceColor = item.source === 'scheduler' ? 'bg-indigo-900 text-indigo-300' : 'bg-gray-800 text-gray-300';
            return `<div data-log-id="${item.id}" class="bg-gray-900 border border-gray-800 hover:border-gray-600 rounded-lg p-4 cursor-pointer transition-colors">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-xs px-2 py-0.5 rounded ${sourceColor}">${item.source || 'chat'}</span>
                        <span class="font-semibold text-white text-sm">${esc(item.character || '')}</span>
                        ${item.user && item.user !== 'system' ? `<span class="text-xs text-gray-500">← ${esc(item.user)}</span>` : ''}
                        ${item.channel_id ? `<span class="text-xs text-gray-600">${esc(resolveChannel(item.channel_id))}</span>` : ''}
                        <span class="${statusColor} text-xs"><i class="fas fa-circle text-[8px]"></i> ${item.status}</span>
                    </div>
                    <div class="flex items-center gap-3 text-xs text-gray-500 flex-shrink-0">
                        <span title="in/out tokens"><i class="fas fa-coins mr-1"></i>${item.input_tokens || 0}/${item.output_tokens || 0}</span>
                        <span>${fmt(item.timestamp)}</span>
                        <span class="text-gray-600">#${item.id}</span>
                    </div>
                </div>
                <p class="text-xs text-gray-400 truncate">${esc(item.trigger || '')}</p>
                ${item.response ? `<p class="text-xs text-gray-500 truncate mt-0.5">${esc(item.response)}</p>` : ''}
            </div>`;
        }

        function adminRow(item) {
            const colors = {
                'character.create':'bg-green-900 text-green-300','character.update':'bg-blue-900 text-blue-300',
                'character.delete':'bg-red-900 text-red-300','task.create':'bg-green-900 text-green-300',
                'task.update':'bg-blue-900 text-blue-300','task.delete':'bg-red-900 text-red-300',
                'config.update':'bg-amber-900 text-amber-300','config.security.update':'bg-red-900 text-red-300','config.security_update':'bg-red-900 text-red-300',
                'servers.override.on':'bg-blue-900 text-blue-300','servers.override.off':'bg-blue-900 text-blue-300',
                'server.activate':'bg-yellow-900 text-yellow-300','server.deactivate':'bg-yellow-900 text-yellow-300',
            };
            const labels = {
                'config.security_update': 'config.security.update',
            };
            const overrideOn  = ['servers.override.on'];
            const overrideOff = ['servers.override.off'];
            const isServerOverride = item.action === 'servers.override.on' || item.action === 'servers.override.off';
            const overrideLabel = overrideOn.includes(item.action) ? 'override on' : overrideOff.includes(item.action) ? 'override off' : null;
            const color = colors[item.action] || 'bg-gray-800 text-gray-300';
            const label = labels[item.action] ?? item.action;
            const targetDisplay = isServerOverride
                ? (serverNames[item.target] || item.target || '')
                : (item.target || '');
            return `<div class="bg-gray-900 border border-gray-800 rounded-lg px-4 py-3 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="text-xs px-2 py-0.5 rounded flex-shrink-0 ${color}">${esc(label)}</span>
                    ${overrideLabel ? `<span class="text-xs text-gray-400 flex-shrink-0">${overrideLabel}</span>` : ''}
                    ${targetDisplay ? `<span class="text-xs text-gray-400 flex-shrink-0">${esc(targetDisplay)}</span>` : ''}
                    ${item.detail ? `<span class="text-xs text-gray-500 truncate">${esc(item.detail)}</span>` : ''}
                </div>
                <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="text-xs text-gray-500">${fmt(item.timestamp)}</span>
                    <span class="text-xs text-gray-600">#${item.id}</span>
                </div>
            </div>`;
        }

        function syncUrl() {
            const p = new URLSearchParams(location.search);
            p.set('tab', currentTab);
            p.set('page', currentPage);
            p.set('limit', LIMIT);
            history.replaceState(null, '', '?' + p.toString());
        }

        function updatePagination() {
            const start = (currentPage - 1) * LIMIT + 1;
            const end = Math.min(currentPage * LIMIT, totalItems);
            document.getElementById('pagination-info').textContent = totalItems ? `${start}–${end} of ${totalItems}` : '';
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage * LIMIT >= totalItems;
        }

        // --- Detail modal ---
        document.getElementById('detail-close').addEventListener('click', () => document.getElementById('detail-modal').classList.add('hidden'));
        document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === document.getElementById('detail-modal')) document.getElementById('detail-modal').classList.add('hidden'); });

        async function openDetail(id) {
            const res = await fetch(`/api/logs/discord/${id}`);
            if (!res.ok) return;
            const item = await res.json();
            const body = document.getElementById('detail-body');
            const isDM = !item.channel_id || item.channel_id === 'dm' || item.channel_id.startsWith('dm:');
            const chResolved = resolveChannel(item.channel_id || '');
            const chParts = (!isDM && chResolved.includes(' / ')) ? chResolved.split(' / ') : [chResolved, ''];
            const chServer = isDM ? 'DM' : chParts[0];
            const dmRecipient = item.channel_id && item.channel_id.startsWith('dm:') ? item.channel_id.slice(3) : null;
            const chChannel = isDM ? (dmRecipient ? `DM - ${dmRecipient}` : 'DM') : (chParts.slice(1).join(' / ') || chParts[0]);
            const statusCls = item.status === 'error' ? 'text-red-400' : 'text-green-400';

            const row = (label, value, cls='text-white') =>
                `<div class="text-gray-400">${label}</div><div class="${cls}">${value}</div>`;

            body.innerHTML = `
                <div class="space-y-4 text-xs">

                    <!-- Timestamp -->
                    <div class="text-gray-500">${fmt(item.timestamp)}</div>

                    <!-- Metadata grid -->
                    <div class="grid gap-x-6 gap-y-2" style="grid-template-columns: max-content 1fr max-content 1fr">
                        ${row('Character', esc(item.character || ''))}
                        ${row('User', esc(item.user || ''))}
                        ${row('Server', esc(chServer))}
                        ${row('Channel', esc(chChannel))}
                        ${row('Model', esc(item.model || ''))}
                        ${row('Tokens in/out', `${item.input_tokens || 0} / ${item.output_tokens || 0}`)}
                        ${row('History', `${item.history_count ?? '—'} msgs`)}
                        ${row('Temperature', item.temperature != null ? item.temperature : '—')}
                        ${row('Source', esc(item.source || ''))}
                        ${row('Status', esc(item.status || ''), statusCls)}
                    </div>

                    <!-- Trigger -->
                    <div class="pt-2 border-t border-gray-800">
                        <div class="text-gray-400 mb-1">Trigger</div>
                        <pre class="bg-gray-800 rounded-lg p-3 text-xs text-gray-200 whitespace-pre-wrap break-words">${esc(item.trigger || '')}</pre>
                    </div>

                    ${item.error_message ? `<div><p class="text-gray-400 mb-1">Error</p><pre class="bg-red-950 border border-red-900 rounded-lg p-3 text-xs text-red-300 whitespace-pre-wrap">${esc(item.error_message)}</pre></div>` : ''}

                    <div><p class="text-gray-400 mb-1">Response</p><pre class="bg-gray-800 rounded-lg p-3 text-xs text-gray-200 whitespace-pre-wrap break-words">${esc(item.response || '')}</pre></div>

                    ${item.conversation_history ? `<div>
                        <div class="flex items-center justify-between mb-1">
                            <p class="text-gray-400">Request JSON</p>
                            <div class="flex items-center gap-3">
                                <button id="copy-response-btn" class="text-xs text-gray-500 hover:text-white flex items-center gap-1 transition-colors"><i class="fas fa-copy"></i> Copy</button>
                                <label class="flex items-center gap-2 text-gray-500 cursor-pointer select-none">
                                    <input type="checkbox" id="req-prettier" class="accent-indigo-500">
                                    <span class="text-xs">Prettier</span>
                                </label>
                            </div>
                        </div>
                        <div id="req-json" class="bg-gray-800 rounded-lg p-3 text-xs text-gray-400 max-h-96 overflow-y-auto whitespace-pre-wrap"></div>
                    </div>` : ''}

                </div>
            `;
            document.getElementById('detail-modal').classList.remove('hidden');

            const copyBtn = document.getElementById('copy-response-btn');
            if (copyBtn) {
                copyBtn.addEventListener('click', () => {
                    const cb = document.getElementById('req-prettier');
                    let text;
                    if (cb && cb.checked && item.conversation_history) {
                        text = item.conversation_history.map(m => {
                            const content = (m.content || '').replace(/\\n/g, '\n').replace(/\[Reply\]/g, '').replace(/\[End\]/g, '').replace(/\[History\]/g, '\n\n[History]').replace(/\]\n(?!\n)/g, ']\n\n').replace(/\n(?!\n)\[/g, '\n\n[').replace(/\n{3,}/g, '\n\n').trim();
                            return `--------------# ${m.role.toUpperCase()} #--------------\n\n${content}`;
                        }).join('\n\n');
                    } else {
                        text = item.response || '';
                    }
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied';
                        setTimeout(() => { copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy'; }, 1500);
                    });
                });
            }

            if (item.conversation_history) {
                const raw = JSON.stringify(item.conversation_history, null, 2);
                const prettier = () => {
                    const text = item.conversation_history.map(m => {
                        const content = (m.content || '').replace(/\\n/g, '\n').replace(/\[Reply\]/g, '').replace(/\[End\]/g, '').replace(/\[History\]/g, '\n\n[History]').replace(/\]\n(?!\n)/g, ']\n\n').replace(/\n(?!\n)\[/g, '\n\n[').replace(/\n{3,}/g, '\n\n').trim();
                        return `--------------# ${m.role.toUpperCase()} #--------------\n\n${content}`;
                    }).join('\n\n');
                    return `<pre class="whitespace-pre-wrap break-words">${esc(text)}</pre>`;
                };
                const el = document.getElementById('req-json');
                const cb = document.getElementById('req-prettier');
                const render = () => { el.innerHTML = cb.checked ? prettier() : `<pre class="whitespace-pre-wrap break-words">${esc(raw)}</pre>`; };
                render();
                cb.addEventListener('change', render);
            }
        }

        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        Promise.all([loadMeta(), loadServerNames()]).then(() => fetchLogs());
    })();
    </script>
</body>
</html>
