<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-darker text-light min-h-screen" data-page="logs">
    <div id="navbar-container"></div>
    <script src="/static/js/navbar.js" defer></script>
    <script src="/static/js/utils.js" defer></script>
    <script src="/static/js/pages/logs.js" defer></script>

    <main class="p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex-between mb-6">
                <h1 class="heading-page">Logs</h1>
                <button id="export-btn" class="btn-gray text-sm"><i class="fas fa-download mr-2"></i>Export JSON</button>
            </div>

            <!-- Tabs -->
            <div class="tabs-bar">
                <button data-tab="discord" class="tab-btn tab-active">Discord</button>
                <button data-tab="admin" class="tab-btn">Admin</button>
            </div>

            <!-- Discord Filters -->
            <div id="discord-filters" class="filter-panel mb-5">
                <div><label class="label-xs">From</label><div class="relative"><input type="date" id="df-from" class="input-field pr-8"><button id="df-from-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div><label class="label-xs">To</label><div class="relative"><input type="date" id="df-to" class="input-field pr-8"><button id="df-to-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div><label class="label-xs">Character</label>
                    <div class="relative">
                        <input type="text" id="df-character" autocomplete="off" placeholder="any" class="input-field w-32 pr-8">
                        <button class="icon-clear-btn hidden" data-clear="df-character" title="Clear"><i class="fas fa-times"></i></button>
                        <div id="df-character-dd" class="autocomplete-dd hidden"></div>
                    </div>
                </div>
                <div><label class="label-xs">User</label>
                    <div class="relative">
                        <input type="text" id="df-user" autocomplete="off" placeholder="any" class="input-field w-32 pr-8">
                        <button class="icon-clear-btn hidden" data-clear="df-user" title="Clear"><i class="fas fa-times"></i></button>
                        <div id="df-user-dd" class="autocomplete-dd hidden"></div>
                    </div>
                </div>
                <div class="relative w-56">
                    <label class="label-xs">Source</label>
                    <button type="button" class="cb-dd-btn w-full" data-dd="dd-source">
                        <span class="cb-dd-label flex-1 min-w-0 text-left truncate">All</span>
                        <span class="flex items-center gap-1.5 shrink-0 ml-auto">
                            <i class="fas fa-times cb-dd-clear hidden" id="dd-source-clear" title="Clear"></i>
                            <i class="fas fa-chevron-down cb-dd-chevron cb-dd-chevron--btn"></i>
                        </span>
                    </button>
                    <div id="dd-source" class="cb-dd hidden w-full">
                        <label class="cb-dd-item"><input type="checkbox" value="chat" class="df-source-cb accent-indigo-500"> Chat</label>
                        <label class="cb-dd-item"><input type="checkbox" value="scheduler" class="df-source-cb accent-indigo-500"> Scheduler</label>
                    </div>
                </div>
                <div class="relative w-56">
                    <label class="label-xs">Status</label>
                    <button type="button" class="cb-dd-btn w-full" data-dd="dd-status">
                        <span class="cb-dd-label flex-1 min-w-0 text-left truncate">All</span>
                        <span class="flex items-center gap-1.5 shrink-0 ml-auto">
                            <i class="fas fa-times cb-dd-clear hidden" id="dd-status-clear" title="Clear"></i>
                            <i class="fas fa-chevron-down cb-dd-chevron cb-dd-chevron--btn"></i>
                        </span>
                    </button>
                    <div id="dd-status" class="cb-dd hidden w-full">
                        <label class="cb-dd-item"><input type="checkbox" value="ok" class="df-status-cb accent-indigo-500"> OK</label>
                        <label class="cb-dd-item"><input type="checkbox" value="error" class="df-status-cb accent-indigo-500"> Error</label>
                    </div>
                </div>
                <button id="discord-clear-btn" class="btn-clear-filter">Clear filters</button>
            </div>

            <!-- Admin Filters -->
            <div id="admin-filters" class="filter-panel mb-5 hidden">
                <div><label class="label-xs">From</label><div class="relative"><input type="date" id="af-from" class="input-field pr-8"><button id="af-from-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div><label class="label-xs">To</label><div class="relative"><input type="date" id="af-to" class="input-field pr-8"><button id="af-to-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div class="relative w-80">
                    <label class="label-xs">Action</label>
                    <button type="button" class="cb-dd-btn w-full" data-dd="dd-action">
                        <span class="cb-dd-label flex-1 min-w-0 text-left truncate">All</span>
                        <span class="flex items-center gap-1.5 shrink-0 ml-auto">
                            <i class="fas fa-times cb-dd-clear hidden" id="dd-action-clear" title="Clear"></i>
                            <i class="fas fa-chevron-down cb-dd-chevron cb-dd-chevron--btn"></i>
                        </span>
                    </button>
                    <div id="dd-action" class="cb-dd cb-dd-searchable hidden w-full">
                        <div class="cb-dd-search-wrap">
                            <input type="text" id="af-action-search" class="input-field text-sm py-2" placeholder="Search actions…" autocomplete="off">
                        </div>
                        <div class="cb-dd-search-list">
                        <label class="cb-dd-item"><input type="checkbox" value="access.request.approve" class="af-action-cb accent-indigo-500"> access.request.approve</label>
                        <label class="cb-dd-item"><input type="checkbox" value="access.request.create" class="af-action-cb accent-indigo-500"> access.request.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="access.request.deny" class="af-action-cb accent-indigo-500"> access.request.deny</label>
                        <label class="cb-dd-item"><input type="checkbox" value="auth.super_admin.created" class="af-action-cb accent-indigo-500"> auth.super_admin.created</label>
                        <label class="cb-dd-item"><input type="checkbox" value="channel.create" class="af-action-cb accent-indigo-500"> channel.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="channel.delete" class="af-action-cb accent-indigo-500"> channel.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="channel.update" class="af-action-cb accent-indigo-500"> channel.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.avatar.mirror" class="af-action-cb accent-indigo-500"> character.avatar.mirror</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.avatar.upload" class="af-action-cb accent-indigo-500"> character.avatar.upload</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.create" class="af-action-cb accent-indigo-500"> character.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.delete" class="af-action-cb accent-indigo-500"> character.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.image.upload" class="af-action-cb accent-indigo-500"> character.image.upload</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.import" class="af-action-cb accent-indigo-500"> character.import</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.update" class="af-action-cb accent-indigo-500"> character.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.security.methods.update" class="af-action-cb accent-indigo-500"> config.security.methods.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.security.update" class="af-action-cb accent-indigo-500"> config.security.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.update" class="af-action-cb accent-indigo-500"> config.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="log.delete" class="af-action-cb accent-indigo-500"> log.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="plugins.reload" class="af-action-cb accent-indigo-500"> plugins.reload</label>
                        <label class="cb-dd-item"><input type="checkbox" value="preset.create" class="af-action-cb accent-indigo-500"> preset.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="preset.delete" class="af-action-cb accent-indigo-500"> preset.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="preset.update" class="af-action-cb accent-indigo-500"> preset.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.activate" class="af-action-cb accent-indigo-500"> server.activate</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.create" class="af-action-cb accent-indigo-500"> server.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.deactivate" class="af-action-cb accent-indigo-500"> server.deactivate</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.delete" class="af-action-cb accent-indigo-500"> server.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="servers.override.off" class="af-action-cb accent-indigo-500"> servers.override.off</label>
                        <label class="cb-dd-item"><input type="checkbox" value="servers.override.on" class="af-action-cb accent-indigo-500"> servers.override.on</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.create" class="af-action-cb accent-indigo-500"> task.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.delete" class="af-action-cb accent-indigo-500"> task.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.update" class="af-action-cb accent-indigo-500"> task.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="trash.restore" class="af-action-cb accent-indigo-500"> trash.restore</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.create" class="af-action-cb accent-indigo-500"> user.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.delete" class="af-action-cb accent-indigo-500"> user.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.password_update" class="af-action-cb accent-indigo-500"> user.password_update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.role_update" class="af-action-cb accent-indigo-500"> user.role_update</label>
                        </div>
                    </div>
                </div>
                <button id="admin-clear-btn" class="btn-clear-filter">Clear filters</button>
            </div>

            <!-- Log List -->
            <div id="log-list" class="space-y-2"></div>

            <!-- Pagination -->
            <div id="pagination" class="pagination-bar">
                <div class="flex items-center gap-2">
                    <span id="pagination-info"></span>
                    <select id="limit-select" class="select-sm ml-3">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="text-hint">/ page</span>
                </div>
                <div class="flex gap-2">
                    <button id="prev-btn" class="btn-page" disabled>← Prev</button>
                    <button id="next-btn" class="btn-page" disabled>Next →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-backdrop hidden">
        <div class="modal-box modal-md max-h-[90vh] overflow-y-auto">
            <div class="modal-header p-5">
                <h2 class="heading-section">Log Detail</h2>
                <button id="detail-close" class="btn-icon"><i class="fas fa-times"></i></button>
            </div>
            <div id="detail-body" class="p-5 space-y-4 text-sm"></div>
        </div>
    </div>


</body>
</html>
