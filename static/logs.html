<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Logs</title><script>window.__authStatus=fetch("/api/me").then(r=>r.ok?r.json():null).catch(()=>null);</script>
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/js/theme.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body class="bg-darker text-light flex flex-col min-h-screen" data-page="logs">
    <div id="navbar-container"></div>
    <script src="/static/js/utils.js" defer></script>
    <script src="/static/js/navbar.js" defer></script>
    <script src="/static/js/pages/logs.js" defer></script>

    <main class="page">
        <div class="main-content">
            <div class="flex flex-wrap items-center justify-between">
                <div class="page-heading">
                    <h1 class="page-title">Logs</h1>
                    <p class="page-subtitle">Browse Discord activity and admin audit logs.</p>
                </div>
                <button id="export-btn" class="btn-gray text-sm"><i class="fas fa-download mr-2"></i>Export JSON</button>
            </div>

            <!-- Tabs -->
            <div class="tabs-bar">
                <button data-tab="discord" class="tab-btn tab-active">Discord</button>
                <button data-tab="admin" class="tab-btn">Admin</button>
            </div>

            <!-- Discord Filters -->
            <div id="discord-filters" class="filter-panel mb-5">
                <div><label class="label-xs">Server</label>
                    <div class="filter-panel-wrap">
                        <input type="text" id="df-server" autocomplete="off" placeholder="all" class="input-field filter-panel-input--auto pr-8">
                        <button class="icon-clear-btn hidden" data-clear="df-server" title="Clear"><i class="fas fa-times"></i></button>
                        <div id="df-server-dd" class="autocomplete-dd hidden"></div>
                    </div>
                </div>
                <div>
                    <label class="label-xs">From</label>
                    <div class="relative">
                        <input type="date" id="df-from" class="field">
                        <button id="clear-df-from-btn" class="icon-clear-btn" title="Clear From date">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="label-xs">To</label>
                    <div class="relative">
                        <input type="date" id="df-to" class="field">
                        <button id="clear-df-to-btn" class="icon-clear-btn" title="Clear To date">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div><label class="label-xs">Character</label>
                    <div class="filter-panel-wrap">
                        <input type="text" id="df-character" autocomplete="off" placeholder="all" class="input-field filter-panel-input--sm pr-8">
                        <button class="icon-clear-btn hidden" data-clear="df-character" title="Clear"><i class="fas fa-times"></i></button>
                        <div id="df-character-dd" class="autocomplete-dd hidden"></div>
                    </div>
                </div>
                <div><label class="label-xs">User</label>
                    <div class="filter-panel-wrap">
                        <input type="text" id="df-user" autocomplete="off" placeholder="all" class="input-field filter-panel-input--sm pr-8">
                        <button class="icon-clear-btn hidden" data-clear="df-user" title="Clear"><i class="fas fa-times"></i></button>
                        <div id="df-user-dd" class="autocomplete-dd hidden"></div>
                    </div>
                </div>
                <div class="filter-panel-col filter-panel-col--sm">
                    <label class="label-xs">Source</label>
                    <button type="button" class="cb-dd-btn" data-dd="dd-source">
                        <span class="cb-dd-label flex-1 min-w-0 text-left truncate">All</span>
                        <span class="flex items-center gap-1.5 shrink-0 ml-auto">
                            <i class="fas fa-times cb-dd-clear hidden" id="dd-source-clear" title="Clear"></i>
                            <i class="fas fa-chevron-down cb-dd-chevron cb-dd-chevron--btn"></i>
                        </span>
                    </button>
                    <div id="dd-source" class="cb-dd hidden">
                        <label class="cb-dd-item"><input type="checkbox" value="chat" class="df-source-cb custom-cb"> Chat</label>
                        <label class="cb-dd-item"><input type="checkbox" value="scheduler" class="df-source-cb custom-cb"> Scheduler</label>
                        <label class="cb-dd-item"><input type="checkbox" value="test" class="df-source-cb custom-cb"> Test</label>
                    </div>
                </div>
                <div class="filter-panel-col filter-panel-col--sm">
                    <label class="label-xs">Status</label>
                    <button type="button" class="cb-dd-btn" data-dd="dd-status">
                        <span class="cb-dd-label flex-1 min-w-0 text-left truncate">All</span>
                        <span class="flex items-center gap-1.5 shrink-0 ml-auto">
                            <i class="fas fa-times cb-dd-clear hidden" id="dd-status-clear" title="Clear"></i>
                            <i class="fas fa-chevron-down cb-dd-chevron cb-dd-chevron--btn"></i>
                        </span>
                    </button>
                    <div id="dd-status" class="cb-dd hidden">
                        <label class="cb-dd-item"><input type="checkbox" value="ok" class="df-status-cb custom-cb"> OK</label>
                        <label class="cb-dd-item"><input type="checkbox" value="error" class="df-status-cb custom-cb"> Error</label>
                    </div>
                </div>
                <button id="discord-clear-btn" class="btn-clear-filter">Clear filters</button>
            </div>

            <!-- Admin Filters -->
            <div id="admin-filters" class="filter-panel mb-5 hidden">
                <div class="filter-panel-col filter-panel-col--md">
                    <label class="label-xs">User</label>
                    <div class="filter-panel-wrap">
                        <input type="text" id="af-user" autocomplete="off" placeholder="all" class="input-field pr-8">
                        <button class="icon-clear-btn hidden" data-clear="af-user" title="Clear"><i class="fas fa-times"></i></button>
                        <div id="af-user-dd" class="autocomplete-dd hidden"></div>
                    </div>
                </div>
                <div class="filter-panel-col filter-panel-col--action">
                    <label class="label-xs">Action</label>
                    <div id="af-action-anchor" class="filter-panel-wrap">
                        <input type="text" id="af-action-search" class="input-field" placeholder="Search actions…" autocomplete="off">
                        <button type="button" class="cb-dd-btn af-action-dd-trigger" data-dd="dd-action" title="Open action list">
                            <span class="cb-dd-label sr-only">All</span>
                            <i class="fas fa-times cb-dd-clear hidden" id="dd-action-clear" title="Clear selected"></i>
                            <i class="fas fa-chevron-down cb-dd-chevron cb-dd-chevron--btn"></i>
                        </button>
                        <div id="dd-action" class="cb-dd cb-dd-searchable cb-dd-scrollable hidden" data-cb-dd-anchor="af-action-anchor">
                        <div class="cb-dd-search-list">
                        <label class="cb-dd-item"><input type="checkbox" value="access.request.approve" class="af-action-cb custom-cb"> access.request.approve</label>
                        <label class="cb-dd-item"><input type="checkbox" value="access.request.create" class="af-action-cb custom-cb"> access.request.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="access.request.deny" class="af-action-cb custom-cb"> access.request.deny</label>
                        <label class="cb-dd-item"><input type="checkbox" value="auth.super_admin.created" class="af-action-cb custom-cb"> auth.super_admin.created</label>
                        <label class="cb-dd-item"><input type="checkbox" value="channel.create" class="af-action-cb custom-cb"> channel.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="channel.delete" class="af-action-cb custom-cb"> channel.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="channel.update" class="af-action-cb custom-cb"> channel.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.avatar.mirror" class="af-action-cb custom-cb"> character.avatar.mirror</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.avatar.upload" class="af-action-cb custom-cb"> character.avatar.upload</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.create" class="af-action-cb custom-cb"> character.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.delete" class="af-action-cb custom-cb"> character.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.image.upload" class="af-action-cb custom-cb"> character.image.upload</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.import" class="af-action-cb custom-cb"> character.import</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.update" class="af-action-cb custom-cb"> character.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.security.methods.update" class="af-action-cb custom-cb"> config.security.methods.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.security.update" class="af-action-cb custom-cb"> config.security.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.update" class="af-action-cb custom-cb"> config.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="discord.dm.delivered" class="af-action-cb custom-cb"> discord.dm.delivered</label>
                        <label class="cb-dd-item"><input type="checkbox" value="discord.dm.queued" class="af-action-cb custom-cb"> discord.dm.queued</label>
                        <label class="cb-dd-item"><input type="checkbox" value="discord.dm.queue_drop" class="af-action-cb custom-cb"> discord.dm.queue_drop</label>
                        <label class="cb-dd-item"><input type="checkbox" value="discord.dm.retry" class="af-action-cb custom-cb"> discord.dm.retry</label>
                        <label class="cb-dd-item"><input type="checkbox" value="log.delete" class="af-action-cb custom-cb"> log.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="preset.create" class="af-action-cb custom-cb"> preset.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="preset.delete" class="af-action-cb custom-cb"> preset.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="preset.update" class="af-action-cb custom-cb"> preset.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.activate" class="af-action-cb custom-cb"> server.activate</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.create" class="af-action-cb custom-cb"> server.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.deactivate" class="af-action-cb custom-cb"> server.deactivate</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.delete" class="af-action-cb custom-cb"> server.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="servers.override.off" class="af-action-cb custom-cb"> servers.override.off</label>
                        <label class="cb-dd-item"><input type="checkbox" value="servers.override.on" class="af-action-cb custom-cb"> servers.override.on</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.create" class="af-action-cb custom-cb"> task.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.delete" class="af-action-cb custom-cb"> task.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.update" class="af-action-cb custom-cb"> task.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="test.chatbot" class="af-action-cb custom-cb"> test.chatbot</label>
                        <label class="cb-dd-item"><input type="checkbox" value="trash.restore" class="af-action-cb custom-cb"> trash.restore</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.create" class="af-action-cb custom-cb"> user.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.delete" class="af-action-cb custom-cb"> user.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.password_update" class="af-action-cb custom-cb"> user.password_update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="user.role_update" class="af-action-cb custom-cb"> user.role_update</label>
                        </div>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="label-xs">From</label>
                    <div class="relative">
                        <input type="date" id="af-from" class="field">
                        <button id="clear-af-from-btn" class="icon-clear-btn" title="Clear From date">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="label-xs">To</label>
                    <div class="relative">
                        <input type="date" id="af-to" class="field">
                        <button id="clear-af-to-btn" class="icon-clear-btn" title="Clear To date">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <button id="admin-clear-btn" class="btn-clear-filter">Clear filters</button>
            </div>

            <!-- Log List -->
            <div id="log-list" class="space-y-2">
                <div class="panel-loader" role="status" aria-live="polite">
                    <span class="loader-spinner" aria-hidden="true"></span>
                    <span class="panel-loader-label">Loading logs...</span>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="pagination-bar">
                <div class="flex items-center gap-2">
                    <span id="pagination-info"></span>
                    <select id="limit-select" class="select-sm ml-3">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="text-hint">/ page</span>
                </div>
                <div class="flex gap-2">
                    <button id="prev-btn" class="btn-page" disabled>← Prev</button>
                    <button id="next-btn" class="btn-page" disabled>Next →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-backdrop hidden">
        <div class="modal-box modal-md max-h-[90vh] overflow-y-auto">
            <div class="modal-header">
                <h2 class="heading-section">Log Detail</h2>
                <button id="detail-close" class="btn-icon"><i class="fas fa-times"></i></button>
            </div>
            <div id="detail-body" class="modal-body modal-body--sm"></div>
        </div>
    </div>

    <site-footer></site-footer>
    <script src="/static/js/footer.js" defer></script>
</body>
</html>
