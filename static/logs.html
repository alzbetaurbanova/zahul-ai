<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-darker text-light min-h-screen" data-page="">
    <div id="navbar-container"></div>
    <script src="/static/js/navbar.js" defer></script>
    <script src="/static/js/pages/logs.js" defer></script>

    <main class="p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-white">Logs</h1>
                <button id="export-btn" class="bg-gray-800 hover:bg-gray-700 text-white text-sm px-3 py-2 rounded-lg"><i class="fas fa-download mr-2"></i>Export JSON</button>
            </div>

            <!-- Tabs -->
            <div class="flex gap-6 border-b border-gray-800 mb-6">
                <button data-tab="discord" class="tab-btn tab-active pb-3 text-sm font-medium text-white transition-colors">Discord</button>
                <button data-tab="admin" class="tab-btn pb-3 text-sm font-medium text-gray-400 hover:text-white transition-colors">Admin</button>
            </div>

            <!-- Discord Filters -->
            <div id="discord-filters" class="bg-gray-900 border border-gray-800 rounded-lg p-4 mb-5 flex flex-wrap gap-3 items-end">
                <div><label class="block text-xs text-gray-400 mb-1">From</label><div class="relative"><input type="date" id="df-from" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="df-from-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div><label class="block text-xs text-gray-400 mb-1">To</label><div class="relative"><input type="date" id="df-to" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="df-to-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div class="relative"><label class="block text-xs text-gray-400 mb-1">Character</label>
                    <input type="text" id="df-character" autocomplete="off" placeholder="any" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 w-32">
                    <div id="df-character-dd" class="hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl max-h-48 overflow-y-auto min-w-full"></div>
                </div>
                <div class="relative"><label class="block text-xs text-gray-400 mb-1">User</label>
                    <input type="text" id="df-user" autocomplete="off" placeholder="any" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 w-32">
                    <div id="df-user-dd" class="hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl max-h-48 overflow-y-auto min-w-full"></div>
                </div>
                <div class="relative">
                    <label class="block text-xs text-gray-400 mb-1">Source</label>
                    <button class="cb-dd-btn bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 flex items-center gap-2 min-w-[8rem]" data-dd="dd-source">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down text-xs text-gray-400 ml-auto"></i>
                    </button>
                    <div id="dd-source" class="cb-dd hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[10rem]">
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="chat" class="df-source-cb accent-indigo-500"> Chat</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="scheduler" class="df-source-cb accent-indigo-500"> Scheduler</label>
                    </div>
                </div>
                <div class="relative">
                    <label class="block text-xs text-gray-400 mb-1">Status</label>
                    <button class="cb-dd-btn bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 flex items-center gap-2 min-w-[8rem]" data-dd="dd-status">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down text-xs text-gray-400 ml-auto"></i>
                    </button>
                    <div id="dd-status" class="cb-dd hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[8rem]">
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="ok" class="df-status-cb accent-indigo-500"> OK</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="error" class="df-status-cb accent-indigo-500"> Error</label>
                    </div>
                </div>
                <button id="discord-clear-btn" class="ml-auto text-gray-400 hover:text-white text-sm self-end">Clear filters</button>
            </div>

            <!-- Admin Filters -->
            <div id="admin-filters" class="hidden bg-gray-900 border border-gray-800 rounded-lg p-4 mb-5 flex flex-wrap gap-3 items-end">
                <div><label class="block text-xs text-gray-400 mb-1">From</label><div class="relative"><input type="date" id="af-from" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="af-from-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div><label class="block text-xs text-gray-400 mb-1">To</label><div class="relative"><input type="date" id="af-to" class="bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 pr-8"><button id="af-to-clear" class="absolute right-2 top-2 text-gray-500 hover:text-gray-300 text-xs icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div class="relative">
                    <label class="block text-xs text-gray-400 mb-1">Action</label>
                    <button class="cb-dd-btn bg-gray-800 border border-gray-700 text-white text-sm rounded-lg px-3 py-2 flex items-center gap-2 min-w-[10rem]" data-dd="dd-action">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down text-xs text-gray-400 ml-auto"></i>
                    </button>
                    <div id="dd-action" class="cb-dd hidden absolute top-full left-0 mt-1 z-30 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[11rem]">
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="character.create" class="af-action-cb accent-indigo-500"> character.create</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="character.update" class="af-action-cb accent-indigo-500"> character.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="character.delete" class="af-action-cb accent-indigo-500"> character.delete</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="task.create" class="af-action-cb accent-indigo-500"> task.create</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="task.update" class="af-action-cb accent-indigo-500"> task.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="task.delete" class="af-action-cb accent-indigo-500"> task.delete</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="config.update" class="af-action-cb accent-indigo-500"> config.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="config.security.update" class="af-action-cb accent-indigo-500"> config.security.update</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="servers.override.on" class="af-action-cb accent-indigo-500"> servers.override.on</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="servers.override.off" class="af-action-cb accent-indigo-500"> servers.override.off</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="server.activate" class="af-action-cb accent-indigo-500"> server.activate</label>
                        <label class="flex items-center gap-3 px-4 py-2 hover:bg-gray-800 cursor-pointer text-sm text-white"><input type="checkbox" value="server.deactivate" class="af-action-cb accent-indigo-500"> server.deactivate</label>
                    </div>
                </div>
                <button id="admin-clear-btn" class="ml-auto text-gray-400 hover:text-white text-sm self-end">Clear filters</button>
            </div>

            <!-- Log List -->
            <div id="log-list" class="space-y-2"></div>

            <!-- Pagination -->
            <div id="pagination" class="flex items-center justify-between mt-6 text-sm text-gray-400">
                <div class="flex items-center gap-2">
                    <span id="pagination-info"></span>
                    <select id="limit-select" class="bg-gray-800 border border-gray-700 text-white text-xs rounded-lg px-2 py-1 ml-3">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="text-xs text-gray-500">/ page</span>
                </div>
                <div class="flex gap-2">
                    <button id="prev-btn" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg disabled:opacity-40" disabled>← Prev</button>
                    <button id="next-btn" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg disabled:opacity-40" disabled>Next →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-900 rounded-xl border border-gray-800 shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between p-5 border-b border-gray-800">
                <h2 class="text-white font-bold text-lg">Log Detail</h2>
                <button id="detail-close" class="text-gray-500 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="detail-body" class="p-5 space-y-4 text-sm"></div>
        </div>
    </div>

    
</body>
</html>
