<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-darker text-light min-h-screen" data-page="logs">
    <div id="navbar-container"></div>
    <script src="/static/js/navbar.js" defer></script>
    <script src="/static/js/utils.js" defer></script>
    <script src="/static/js/pages/logs.js" defer></script>

    <main class="p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex-between mb-6">
                <h1 class="heading-page">Logs</h1>
                <button id="export-btn" class="btn-gray text-sm"><i class="fas fa-download mr-2"></i>Export JSON</button>
            </div>

            <!-- Tabs -->
            <div class="flex gap-6 border-b border-gray-800 mb-6">
                <button data-tab="discord" class="tab-btn tab-active">Discord</button>
                <button data-tab="admin" class="tab-btn">Admin</button>
            </div>

            <!-- Discord Filters -->
            <div id="discord-filters" class="filter-panel mb-5">
                <div><label class="label-xs">From</label><div class="relative"><input type="date" id="df-from" class="input-field pr-8"><button id="df-from-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div><label class="label-xs">To</label><div class="relative"><input type="date" id="df-to" class="input-field pr-8"><button id="df-to-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div class="relative"><label class="label-xs">Character</label>
                    <input type="text" id="df-character" autocomplete="off" placeholder="any" class="input-field w-32">
                    <div id="df-character-dd" class="autocomplete-dd hidden"></div>
                </div>
                <div class="relative"><label class="label-xs">User</label>
                    <input type="text" id="df-user" autocomplete="off" placeholder="any" class="input-field w-32">
                    <div id="df-user-dd" class="autocomplete-dd hidden"></div>
                </div>
                <div class="relative">
                    <label class="label-xs">Source</label>
                    <button class="cb-dd-btn min-w-[8rem]" data-dd="dd-source">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down cb-dd-chevron"></i>
                    </button>
                    <div id="dd-source" class="cb-dd hidden min-w-[10rem]">
                        <label class="cb-dd-item"><input type="checkbox" value="chat" class="df-source-cb accent-indigo-500"> Chat</label>
                        <label class="cb-dd-item"><input type="checkbox" value="scheduler" class="df-source-cb accent-indigo-500"> Scheduler</label>
                    </div>
                </div>
                <div class="relative">
                    <label class="label-xs">Status</label>
                    <button class="cb-dd-btn min-w-[8rem]" data-dd="dd-status">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down cb-dd-chevron"></i>
                    </button>
                    <div id="dd-status" class="cb-dd hidden min-w-[8rem]">
                        <label class="cb-dd-item"><input type="checkbox" value="ok" class="df-status-cb accent-indigo-500"> OK</label>
                        <label class="cb-dd-item"><input type="checkbox" value="error" class="df-status-cb accent-indigo-500"> Error</label>
                    </div>
                </div>
                <button id="discord-clear-btn" class="btn-clear-filter">Clear filters</button>
            </div>

            <!-- Admin Filters -->
            <div id="admin-filters" class="filter-panel mb-5 hidden">
                <div><label class="label-xs">From</label><div class="relative"><input type="date" id="af-from" class="input-field pr-8"><button id="af-from-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div><label class="label-xs">To</label><div class="relative"><input type="date" id="af-to" class="input-field pr-8"><button id="af-to-clear" class="icon-clear-btn"><i class="fas fa-times"></i></button></div></div>
                <div class="relative">
                    <label class="label-xs">Action</label>
                    <button class="cb-dd-btn min-w-[10rem]" data-dd="dd-action">
                        <span class="cb-dd-label">All</span><i class="fas fa-chevron-down cb-dd-chevron"></i>
                    </button>
                    <div id="dd-action" class="cb-dd hidden min-w-[11rem]">
                        <label class="cb-dd-item"><input type="checkbox" value="character.create" class="af-action-cb accent-indigo-500"> character.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.update" class="af-action-cb accent-indigo-500"> character.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="character.delete" class="af-action-cb accent-indigo-500"> character.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.create" class="af-action-cb accent-indigo-500"> task.create</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.update" class="af-action-cb accent-indigo-500"> task.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="task.delete" class="af-action-cb accent-indigo-500"> task.delete</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.update" class="af-action-cb accent-indigo-500"> config.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="config.security.update" class="af-action-cb accent-indigo-500"> config.security.update</label>
                        <label class="cb-dd-item"><input type="checkbox" value="servers.override.on" class="af-action-cb accent-indigo-500"> servers.override.on</label>
                        <label class="cb-dd-item"><input type="checkbox" value="servers.override.off" class="af-action-cb accent-indigo-500"> servers.override.off</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.activate" class="af-action-cb accent-indigo-500"> server.activate</label>
                        <label class="cb-dd-item"><input type="checkbox" value="server.deactivate" class="af-action-cb accent-indigo-500"> server.deactivate</label>
                    </div>
                </div>
                <button id="admin-clear-btn" class="btn-clear-filter">Clear filters</button>
            </div>

            <!-- Log List -->
            <div id="log-list" class="space-y-2"></div>

            <!-- Pagination -->
            <div id="pagination" class="pagination-bar">
                <div class="flex items-center gap-2">
                    <span id="pagination-info"></span>
                    <select id="limit-select" class="select-sm ml-3">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="text-hint">/ page</span>
                </div>
                <div class="flex gap-2">
                    <button id="prev-btn" class="btn-page" disabled>← Prev</button>
                    <button id="next-btn" class="btn-page" disabled>Next →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-backdrop hidden">
        <div class="modal-box modal-md max-h-[90vh] overflow-y-auto">
            <div class="modal-header p-5">
                <h2 class="heading-section">Log Detail</h2>
                <button id="detail-close" class="btn-icon"><i class="fas fa-times"></i></button>
            </div>
            <div id="detail-body" class="p-5 space-y-4 text-sm"></div>
        </div>
    </div>


</body>
</html>
