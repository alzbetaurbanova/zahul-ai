
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy">
    <title>zahul-ai - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-darker text-light" data-page="dashboard">
    <div class="flex flex-col min-h-screen">
        <div id="navbar-container"></div>
        <script src="/static/js/utils.js" defer></script>
        <script src="/static/js/navbar.js" defer></script>
        <script src="/static/js/pages/index.js" defer></script>

        <!-- Main Content -->
        <main class="page">
            <div class="main-content max-w-7xl w-full">
                <div class="page-heading">
                    <h1 class="page-title">Admin Dashboard</h1>
                    <p class="page-subtitle">Manage your zahul-ai instance</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Bot Control + Servers -->
                    <div class="lg:col-span-1 flex flex-col gap-4">
                        <div class="card-dark">
                            <h2 class="heading-card mb-4">Bot Control</h2>
                            
                            <div class="flex-between mb-6">
                                <div>
                                    <span class="text-sm text-gray-400">Current Status:</span>
                                    <div class="flex items-center mt-1">
                                        <span id="control-status-indicator" class="status-indicator"></span>
                                        <span id="control-status-text"></span>
                                    </div>
                                </div>
                                <button id="power-btn" class="power-btn">
                                    <i class="fas fa-power-off mr-2"></i> Activate
                                </button>
                            </div>
                            
                            <div id="invite-container" class="hidden">
                                <div class="mt-4">
                                    <label class="label-muted">Invite Link</label>
                                    <div class="flex">
                                        <input id="invite-link" type="text" readonly class="input-joined" placeholder="Bot not active">
                                        <button id="copy-invite" class="btn-joined">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Servers -->
                        <div class="card-dark">
                            <h2 class="heading-sidebar">Servers</h2>
                            <div id="servers-list" class="space-y-2">
                                <p class="text-muted">Loading...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Log Stream -->
                    <div class="lg:col-span-2">
                        <div class="card-dark h-full">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="heading-card">Console</h2>
                                <div class="flex items-center">
                                    <span class="text-xs text-gray-400 mr-2">Auto-scroll</span>
                                    <label class="toggle-wrap">
                                        <input id="auto-scroll-toggle" type="checkbox" value="" class="sr-only peer" checked>
                                        <div class="dashboard-toggle-ui"></div>
                                    </label>
                                </div>
                            </div>
                            <div id="log-container" class="log-stream rounded-lg p-4 h-96 overflow-y-auto">
                                <div class="text-muted">Waiting for logs...</div>
                            </div>
                            <div class="mt-3 text-right">
                                <a href="/logs" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">View full logs →</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    
</body>
</html>
