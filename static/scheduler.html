<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-darker text-light min-h-screen" data-page="scheduler">
    <div id="toast-container" class="toast"></div>

    <div id="navbar-container"></div>
    <script src="/static/js/navbar.js" defer></script>
    <script src="/static/js/utils.js" defer></script>
    <script src="/static/js/pages/scheduler.js" defer></script>

    <!-- Main Content -->
    <main class="p-6">
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <h1 class="heading-page">Scheduler</h1>
                <button id="create-btn" class="btn-primary text-sm">
                    <i class="fas fa-plus mr-2"></i>New Task
                </button>
            </div>

            <!-- Filters -->
            <div class="filter-panel mb-6">
                <div class="relative">
                    <label class="label-xs">Character</label>
                    <input type="text" id="filter-character" autocomplete="off" placeholder="any"
                        class="input-field w-36">
                    <div id="filter-character-dd" class="autocomplete-dd hidden"></div>
                </div>
                <div>
                    <label class="label-xs">Type</label>
                    <select id="filter-type" class="input-field">
                        <option value="">All</option>
                        <option value="schedule">Schedule</option>
                        <option value="reminder">Reminder</option>
                    </select>
                </div>
                <div class="relative">
                    <label class="label-xs">Status</label>
                    <button id="filter-status-btn" class="cb-dd-btn min-w-[8rem]">
                        <span id="filter-status-label">All</span><i class="fas fa-chevron-down cb-dd-chevron"></i>
                    </button>
                    <div id="filter-status-dd" class="cb-dd hidden min-w-[9rem]">
                        <label id="fs-active-row" class="cb-dd-item"><input type="checkbox" value="active" class="filter-status-cb accent-indigo-500"> Active</label>
                        <label id="fs-upcoming-row" class="cb-dd-item"><input type="checkbox" value="upcoming" class="filter-status-cb accent-indigo-500"> Upcoming</label>
                        <label id="fs-done-row" class="cb-dd-item"><input type="checkbox" value="done" class="filter-status-cb accent-indigo-500"> Done</label>
                        <label id="fs-disabled-row" class="cb-dd-item"><input type="checkbox" value="disabled" class="filter-status-cb accent-indigo-500"> Disabled</label>
                        <label id="fs-failed-row" class="cb-dd-item"><input type="checkbox" value="failed" class="filter-status-cb accent-indigo-500"> Failed</label>
                    </div>
                </div>
                <div>
                    <label class="label-xs">From</label>
                    <div class="relative">
                        <input type="date" id="filter-from" class="input-field pr-8">
                        <button id="clear-from-btn" class="icon-clear-btn" title="Clear From date">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="label-xs">To</label>
                    <div class="relative">
                        <input type="date" id="filter-to" class="input-field pr-8">
                        <button id="clear-to-btn" class="icon-clear-btn" title="Clear To date">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <button id="clear-filter-btn" class="btn-clear-filter">Clear filters</button>
            </div>

            <!-- Task List -->
            <div id="task-list" class="space-y-3">
                <div class="text-muted text-center py-12">Loading...</div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="pagination-bar">
                <div class="flex items-center gap-2">
                    <span id="pagination-info"></span>
                    <select id="page-size-select" class="select-sm ml-3">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="text-hint">/ page</span>
                </div>
                <div class="flex gap-2">
                    <button id="prev-btn" class="btn-page" disabled>← Prev</button>
                    <button id="next-btn" class="btn-page">Next →</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-backdrop hidden">
        <div class="modal-box modal-sm">
            <div class="modal-header p-5">
                <div class="flex items-center gap-3">
                    <div id="detail-avatar"></div>
                    <div>
                        <div class="flex items-center gap-2 mb-0.5" id="detail-badges"></div>
                        <h2 id="detail-name" class="heading-section leading-tight"></h2>
                    </div>
                </div>
                <button id="detail-close" class="btn-icon"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-5 space-y-3 text-sm">
                <div class="detail-row"><span>Character</span><span id="detail-character" class="text-white"></span></div>
                <div class="detail-row"><span>Target</span><span id="detail-target" class="text-white"></span></div>
                <div class="detail-row"><span>Status</span><span id="detail-status" class="flex items-center gap-2 flex-wrap justify-end"></span></div>
                <div id="detail-time-row" class="detail-row"><span>Time</span><span id="detail-time" class="text-white"></span></div>
                <div id="detail-repeat-row" class="detail-row"><span>Repeat</span><span id="detail-repeat" class="text-white"></span></div>
                <div id="detail-next-run-row" class="hidden detail-row"><span>Next run</span><span id="detail-next-run" class="text-indigo-300 font-medium"></span></div>
                <div id="detail-instructions-row" class="pt-1">
                    <p class="text-dim mb-1">Instructions</p>
                    <p id="detail-instructions" class="instructions-display"></p>
                </div>
            </div>
            <div class="flex items-center justify-between p-5 border-t border-gray-800">
                <button id="detail-delete" class="btn-delete"><i class="fas fa-trash"></i> Delete</button>
                <div class="flex gap-2">
                    <button id="detail-logs" class="btn-gray-sm"><i class="fas fa-list-alt mr-1"></i>Logs</button>
                    <button id="detail-toggle" class="btn-gray-sm"></button>
                    <button id="detail-edit" class="btn-primary-sm"><i class="fas fa-pen mr-1"></i>Edit</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create / Edit Modal -->
    <div id="modal" class="modal-backdrop top hidden">
        <div class="modal-box modal-md max-h-[90vh] overflow-y-auto">
            <div class="modal-header p-6">
                <h2 id="modal-title" class="heading-card">New Task</h2>
                <button id="modal-close" class="btn-icon"><i class="fas fa-times"></i></button>
            </div>
            <form id="task-form" class="p-6 space-y-4">
                <input type="hidden" id="task-id">

                <!-- Type -->
                <div>
                    <label class="label-form">Type</label>
                    <div class="flex gap-2">
                        <button type="button" data-type="reminder" id="type-reminder"
                            class="type-btn flex-1 tab-amber-on">
                            <i class="fas fa-bell mr-1"></i> Reminder
                        </button>
                        <button type="button" data-type="schedule" id="type-schedule"
                            class="type-btn flex-1 tab-off">
                            <i class="fas fa-rotate mr-1"></i> Schedule
                        </button>
                    </div>
                    <input type="hidden" id="selected-type" value="reminder">
                </div>

                <!-- Name (schedules only) -->
                <div id="name-field">
                    <label class="label-form">Name</label>
                    <input type="text" id="f-name" minlength="3" placeholder="Task label..." class="input-field">
                </div>

                <!-- Character + History toggle -->
                <div class="flex items-start gap-3">
                    <div id="char-col" class="w-full transition-all">
                        <label class="label-form">Character</label>
                        <div class="relative">
                            <input type="text" id="f-character" autocomplete="off" required placeholder="Select character..."
                                class="input-field">
                            <div id="f-character-dd" class="autocomplete-dd hidden"></div>
                        </div>
                    </div>
                    <div id="history-limit-row" class="hidden flex-col shrink-0 ml-auto">
                        <label class="label-form">Message history</label>
                        <div class="flex items-center gap-4">
                            <button type="button" id="history-toggle" aria-pressed="false">
                                <span id="history-thumb"></span>
                            </button>
                            <input type="number" id="f-history-limit" min="0" disabled
                                class="input-field w-20 disabled:opacity-40 disabled:cursor-not-allowed">
                        </div>
                    </div>
                </div>

                <!-- Target -->
                <div>
                    <label class="label-form">Target Type</label>
                    <div class="flex gap-2">
                        <button type="button" data-target="channel" id="ttype-channel"
                            class="ttype-btn flex-1 tab-indigo-on">
                            <i class="fas fa-hashtag mr-1"></i> Channel
                        </button>
                        <button type="button" data-target="dm" id="ttype-dm"
                            class="ttype-btn flex-1 tab-off">
                            <i class="fas fa-user mr-1"></i> DM
                        </button>
                    </div>
                    <input type="hidden" id="f-target-type" value="channel">
                </div>

                <!-- Channel combobox -->
                <div id="target-channel-fields">
                    <label class="label-form">Channel</label>
                    <div class="relative">
                        <input type="text" id="f-channel-input" autocomplete="off" required placeholder="Type to search or paste ID..."
                            class="input-field">
                        <div id="f-channel-dropdown" class="picker-dd hidden"></div>
                    </div>
                </div>

                <!-- DM combobox -->
                <div id="target-dm-fields" class="hidden">
                    <label class="label-form">User</label>
                    <div class="relative">
                        <input type="text" id="f-dm-input" autocomplete="off" required placeholder="Type to search or paste ID..."
                            class="input-field">
                        <div id="f-dm-dropdown" class="picker-dd hidden"></div>
                    </div>
                </div>

                <!-- Message mode + instructions -->
                <div>
                    <div class="flex-between mb-2">
                        <label id="instructions-label" class="label-inline">Message Text</label>
                        <div id="mode-toggle" class="flex gap-1 bg-gray-800 border border-gray-700 rounded-lg p-0.5">
                            <button type="button" data-mode="exact" id="mode-exact"
                                class="mode-btn mode-tab-on">
                                Exact
                            </button>
                            <button type="button" data-mode="generate" id="mode-generate"
                                class="mode-btn mode-tab-off">
                                Generate
                            </button>
                        </div>
                    </div>
                    <input type="hidden" id="f-message-mode" value="exact">
                    <textarea id="f-instructions" rows="3" class="input-field resize-none"
                        placeholder="What the character will say..."></textarea>
                </div>

                <!-- Reminder fields -->
                <div id="reminder-fields">
                    <label class="label-form">Date & Time <span class="text-xs text-gray-400 font-normal">(Europe/Bratislava)</span></label>
                    <input type="datetime-local" id="f-scheduled-time" class="input-field">
                </div>

                <!-- Schedule fields -->
                <div id="schedule-fields" class="hidden space-y-4">
                    <div>
                        <label class="label-form">Repeat Type</label>
                        <select id="f-repeat-type" class="input-field w-44">
                            <option value="daily">Daily</option>
                            <option value="weekly" selected>Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                    <div class="flex gap-4 items-start mb-4">
                        <div class="flex-1">
                            <div id="rp-weekly">
                                <label class="label-form">Repeat Days</label>
                                <div class="flex flex-wrap gap-2" id="day-checkboxes"></div>
                            </div>
                            <div id="rp-monthly" class="hidden">
                                <label class="label-form">Day of Month</label>
                                <input type="number" id="f-repeat-month-day" min="1" max="31" value="1" class="input-field w-24">
                            </div>
                            <div id="rp-yearly" class="hidden flex gap-3">
                                <div>
                                    <label class="label-form">Month</label>
                                    <select id="f-repeat-year-month" class="input-field">
                                        <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                                        <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                                        <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                                        <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="label-form">Day</label>
                                    <input type="number" id="f-repeat-year-day" min="1" max="31" value="1" class="input-field w-20">
                                </div>
                            </div>
                            <div id="rp-daily" class="hidden">
                                <p class="text-sm text-gray-500">Fires every day at the selected time.</p>
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            <label class="label-form">Time <span class="text-xs text-gray-400 font-normal">(SK)</span></label>
                            <input type="time" id="f-repeat-time" class="input-field w-36">
                        </div>
                    </div>
                </div>

                <!-- Status (edit only) -->
                <div id="status-field" class="hidden">
                    <label class="label-form">Status</label>
                    <select id="f-status" class="input-field">
                        <option value="upcoming">Upcoming</option>
                        <option value="active">Active</option>
                        <option value="done">Done</option>
                        <option value="disabled">Disabled</option>
                    </select>
                </div>

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" id="modal-cancel" class="btn-gray text-sm">Cancel</button>
                    <button type="submit" class="btn-primary px-6 text-sm">Save</button>
                </div>
            </form>
        </div>
    </div>


</body>
</html>
