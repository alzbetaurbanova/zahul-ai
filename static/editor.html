<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Avatar Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body data-page="characters">
    <div id="navbar-container"></div>
    <script src="/static/js/navbar.js" defer></script>
    <script src="/static/js/pages/editor.js" defer></script>

    <!-- Main -->
    <main class="max-w-5xl mx-auto p-8 space-y-8">
        <h1 class="page-title">Avatar Editor</h1>

        <div class="flex gap-10 flex-wrap">
            <!-- Canvas + previews -->
            <div class="flex-shrink-0 space-y-4">
                <!-- Main canvas with circle overlay -->
                <div class="relative-inline-block">
                    <canvas id="avatar-canvas" width="360" height="360"></canvas>
                    <div id="circle-overlay"></div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-2 flex-wrap">
                    <button id="reset-btn" class="btn-gray-sm">Reset</button>
                    <button id="export-btn" class="btn-primary-sm"><i class="fas fa-download mr-1"></i>Export PNG</button>
                    <button id="discord-upload-btn" class="btn-discord"><i class="fab fa-discord mr-1"></i>Save on Discord</button>
                </div>

                <!-- Discord CDN URL result -->
                <div id="cdn-result" class="hidden mt-1">
                    <p class="label-xs">Discord CDN URL — click to copy:</p>
                    <div class="flex gap-2">
                        <input id="cdn-url" type="text" readonly class="input-cdn" onclick="this.select()">
                        <button id="cdn-copy-btn" class="btn-gray-sm"><i class="fas fa-copy"></i></button>
                    </div>
                </div>

                <!-- Discord preview -->
                <div>
                    <p class="text-hint mb-2 uppercase tracking-wide">Discord preview</p>
                    <div class="flex items-center gap-3">
                        <canvas id="discord-preview" width="40" height="40" class="preview-canvas"></canvas>
                        <div class="text-xs text-gray-500 leading-relaxed">
                            <p class="preview-name">Character Name</p>
                            <p>This is how your avatar<br>appears on Discord.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex-grow min-w-[280px] space-y-5">
                <!-- Load from URL -->
                <div>
                    <label class="label-form">Image URL</label>
                    <div class="flex gap-2">
                        <input type="text" id="url-input" class="input-field flex-grow" placeholder="https://...">
                        <button id="url-load-btn" class="btn-primary-sm">Load</button>
                    </div>
                </div>

                <!-- Import PNG -->
                <div>
                    <label class="label-form">Import PNG</label>
                    <label for="file-input" class="file-label">
                        <i class="fas fa-file-image icon-accent"></i>
                        <span id="file-label">Choose a PNG or image file…</span>
                    </label>
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                </div>

                <!-- Sliders -->
                <div class="pt-1">
                    <div class="slider-row"><label>Zoom</label><input type="range" id="sl-zoom" min="0.1" max="2" step="0.01" value="1"><span id="sl-zoom-val">1.00</span></div>
                    <div class="slider-row"><label>Brightness</label><input type="range" id="sl-brightness" min="-100" max="100" step="1" value="0"><span id="sl-brightness-val">0</span></div>
                    <div class="slider-row"><label>Contrast</label><input type="range" id="sl-contrast" min="-100" max="100" step="1" value="0"><span id="sl-contrast-val">0</span></div>
                    <div class="slider-row"><label>Hue</label><input type="range" id="sl-hue" min="-180" max="180" step="1" value="0"><span id="sl-hue-val">0</span></div>
                </div>
            </div>
        </div>

        <!-- Export result -->
        <div id="result" class="hidden">
            <p class="text-hint mb-2">Exported — right-click to save, or download started automatically.</p>
            <img id="result-img" src="" alt="exported" class="rounded-lg max-w-xs border border-gray-700">
        </div>
    </main>

    
</body>
</html>
