<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-page">
    <div class="login-shell">
        <div class="login-brand">
            <img src="/zahul" alt="zahul-ai" class="login-brand-logo">
            <span class="login-brand-name">zahul-ai</span>
        </div>
        <div class="modal-box p-8">
            <h2 class="heading-card mb-6 text-center">Panel Login</h2>
            <form method="POST" action="/login">
                <div class="mb-5">
                    <label for="password" class="label-form">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="off"
                        required
                        autofocus
                        class="input-field"
                        placeholder="Enter panel password"
                    >
                </div>
                <button type="submit" class="btn-primary w-full">
                    Login
                </button>
            </form>
            <div id="hint-msg" class="login-hint hidden">
                Hint: <span id="hint-text"></span>
            </div>
            <div id="error-msg" class="login-error hidden">
                Incorrect password. Try again.
            </div>
        </div>
    </div>
    <script src="/static/js/pages/login.js" defer></script>
</body>
</html>
