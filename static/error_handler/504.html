<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Request Timed Out</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="brand-header">
            <img src="/zahul" alt="zahul-ai">
            <span>zahul-ai</span>
        </div>
        <div class="modal-box p-8 text-center">
            <div class="error-page-icon-wrap error-icon-orange mx-auto mb-4">
                <i class="fas fa-hourglass-half"></i>
            </div>
            <p class="error-page-code error-code-orange">504</p>
            <h1 class="error-page-title">Request Timed Out</h1>
            <p class="error-page-msg">The server took too long to respond. This is usually temporary — please try again.</p>
            <div class="error-page-actions">
                <a href="/" class="btn-primary">Go home</a>
                <button onclick="location.reload()" class="btn-gray">Try again</button>
            </div>
        </div>
    </div>
</body>
</html>
