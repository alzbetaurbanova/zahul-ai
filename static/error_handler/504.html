<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - 504 Gateway Timeout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center" style="background:#0f172a;color:#f8fafc;font-family:sans-serif">
    <div class="text-center p-10 max-w-md w-full mx-4 rounded-xl border" style="background:#1e293b;border-color:#374151">
        <div class="text-5xl mb-4" style="color:#ea580c"><i class="fas fa-hourglass-half"></i></div>
        <p class="text-7xl font-bold mb-2" style="color:#ea580c">504</p>
        <h1 class="text-xl font-semibold mb-3">Gateway Timeout</h1>
        <p class="text-sm mb-6" style="color:#9ca3af">The server took too long to respond. Please try again.</p>
        <a href="/" class="inline-block px-6 py-2 rounded-lg text-sm font-medium text-white" style="background:#6366f1">Go home</a>
        <button onclick="location.reload()" class="inline-block ml-2 px-6 py-2 rounded-lg text-sm font-medium" style="background:#374151;color:#f8fafc">Retry</button>
    </div>
</body>
</html>
