<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Update in Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center" style="background:#0f172a;color:#f8fafc;font-family:sans-serif">
    <div class="text-center p-10 max-w-md w-full mx-4 rounded-xl border" style="background:#1e293b;border-color:#374151">
        <div class="text-5xl mb-4" style="color:#f59e0b"><i class="fas fa-arrows-rotate"></i></div>
        <p class="text-7xl font-bold mb-2" style="color:#f59e0b">502</p>
        <h1 class="text-xl font-semibold mb-3">Update in Progress</h1>
        <p class="text-sm mb-2" style="color:#9ca3af">The server is restarting or updating. This usually takes a few seconds.</p>
        <p class="text-sm mb-6" style="color:#6b7280">Retrying in <span id="countdown">10</span>s…</p>
        <button onclick="location.reload()" class="inline-block px-6 py-2 rounded-lg text-sm font-medium text-white" style="background:#6366f1">Retry now</button>
    </div>
    <script>
        let t = 10;
        const el = document.getElementById('countdown');
        const iv = setInterval(() => { el.textContent = --t; if (t <= 0) { clearInterval(iv); location.reload(); } }, 1000);
    </script>
</body>
</html>
