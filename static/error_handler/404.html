<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zahul-ai - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="brand-header">
            <img src="/zahul" alt="zahul-ai">
            <span>zahul-ai</span>
        </div>
        <div class="modal-box p-8 text-center">
            <div class="error-page-icon-wrap error-icon-indigo mx-auto mb-4">
                <i class="fas fa-compass"></i>
            </div>
            <p class="error-page-code error-code-indigo">404</p>
            <h1 class="error-page-title">Page Not Found</h1>
            <p class="error-page-msg">The page you're looking for doesn't exist or may have been moved.</p>
            <div class="error-page-actions">
                <a href="/" class="btn-primary">Go home</a>
            </div>
        </div>
    </div>
</body>
</html>
